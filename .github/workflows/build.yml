name: Build Paper Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build plugin
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: lowerfire-plugin
          path: build/libs/*.jar
